<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTS Team Official - Tech Portal</title>
    <style>
        /* Modern Dark Theme Styling */
        body { 
            background-color: #0d1117; 
            color: #ffffff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            width: 95%; 
            max-width: 800px; 
            padding: 20px; 
            text-align: center; 
        }
        header { margin-bottom: 40px; margin-top: 20px; }
        h1 { color: #58a6ff; text-transform: uppercase; font-size: 2.2rem; margin: 0; }
        .tagline { color: #8b949e; font-size: 1rem; }

        /* Method Card Styling */
        .method-card { 
            background: #161b22; 
            border-radius: 15px; 
            border: 1px solid #30363d; 
            padding: 15px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: left;
        }
        .method-info { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        .method-date { color: #8b949e; font-size: 0.85rem; font-weight: bold; }
        .method-name { color: #bc8cff; font-weight: bold; font-size: 1.1rem; }
        
        /* Video Player Styling */
        .video-box { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 10px; 
            background: #000;
        }
        .video-box iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 0; 
        }

        /* WhatsApp Floating Button */
        .btn-wa { 
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366; 
            color: white; 
            padding: 15px 25px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 50px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-label {
            color: #58a6ff;
            text-align: left;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>UTS Team Official</h1>
            <p class="tagline">Daily Private Methods & Tutorials</p>
        </header>

        <span class="section-label">🔥 LATEST UPLOADS</span>

        <div class="method-card">
            <div class="method-info">
                <span class="method-date">April 14, 2026</span>
                <span class="method-name">METHOD: TERMUX FACEBOOK BRUTEFORCE</span>
            </div>
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/VIDEO_ID_HERE" allowfullscreen></iframe>
            </div>
        </div>
        </div>

    <a href="https://wa.me/923339588254" class="btn-wa">
        <span>Chat on WhatsApp</span>
    </a>

</body>
</html>
