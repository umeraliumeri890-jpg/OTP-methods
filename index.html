<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTS Team Official</title>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 95%; max-width: 800px; padding: 20px; text-align: center; }
        header { margin-bottom: 30px; border-bottom: 2px solid #30363d; padding-bottom: 20px; }
        h1 { color: #58a6ff; }
        .method-card { background: #161b22; border-radius: 15px; border: 1px solid #30363d; padding: 15px; margin-bottom: 25px; text-align: left; }
        .method-name { color: #bc8cff; font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 12px; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .visit-btn { display: block; background: #238636; color: white; text-align: center; padding: 12px; margin-top: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .section-label { color: #58a6ff; font-weight: bold; margin: 20px 0; display: block; font-size: 1.3rem; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>UTS Team Official</h1></header>
        <span class="section-label">🚀 LATEST UPDATES</span>
</div>
</body>
</html>
