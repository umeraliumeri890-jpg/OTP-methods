<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UTS Team Official Methods</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1420 100%);
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 16px 80px 16px;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px 0;
            border-bottom: 2px solid #2a2f3f;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00d4ff, #7b2f9d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #8a8f9f;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            background: #1a1f2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #00d4ff;
            margin-top: 12px;
        }

        /* Search Bar Styles */
        .search-container {
            margin-bottom: 30px;
        }

        .search-box {
            background: #11161f;
            border: 1px solid #2a2f3f;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: #5a5f6f;
        }

        .search-box .search-icon {
            color: #00d4ff;
            font-size: 1.2rem;
        }

        .search-box .clear-btn {
            background: none;
            border: none;
            color: #5a5f6f;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            display: none;
        }

        .search-box .clear-btn:hover {
            color: #ff4444;
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #8a8f9f;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #11161f;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 30px;
            border: 1px solid #2a2f3f;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8a8f9f;
        }

        .methods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .method-card {
            background: #11161f;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #2a2f3f;
            position: relative;
            overflow: hidden;
        }

        .method-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
        }

        .method-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #00d4ff, #7b2f9d);
        }

        .method-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #fff;
            padding-right: 10px;
            word-break: break-word;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        .method-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.85rem;
            margin-top: 10px;
            transition: gap 0.2s ease;
        }

        .method-link:hover {
            gap: 12px;
            color: #7b2f9d;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #11161f;
            border-radius: 16px;
            border: 1px dashed #2a2f3f;
        }

        .empty-state p {
            color: #8a8f9f;
            margin-top: 10px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: #11161f;
            border-radius: 16px;
            border: 1px dashed #ff4444;
        }

        .no-results p {
            color: #ff8888;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
            cursor: pointer;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-float svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #5a5f6f;
            font-size: 0.8rem;
            border-top: 1px solid #2a2f3f;
            margin-top: 40px;
        }

        .highlight {
            background: rgba(0, 212, 255, 0.2);
            border-radius: 4px;
            padding: 0 2px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px 12px 80px 12px;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .methods-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .whatsapp-float {
                width: 50px;
                height: 50px;
                bottom: 16px;
                right: 16px;
            }

            .whatsapp-float svg {
                width: 28px;
                height: 28px;
            }

            .search-box {
                padding: 10px 16px;
            }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            .methods-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ UTS Team Official Methods</h1>
            <p>Premium Tech Solutions & Methods Hub</p>
            <div class="badge">🔐 Dynamic Content Portal</div>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search method by name... (e.g., WhatsApp, Facebook, OTP)">
                <button class="clear-btn" id="clearSearch" onclick="clearSearch()">✖</button>
            </div>
            <div class="search-info" id="searchInfo"></div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="methodCount">0</div>
                <div class="stat-label">Total Methods</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="visibleCount">0</div>
                <div class="stat-label">Showing</div>
            </div>
        </div>

        <!-- START_METHODS_CONTAINER -->
        <div id="methodsContainer">
            <div class="methods-grid" id="methodsGrid">
                <!-- No methods added yet -->
                </div>

                <!-- END_METHODS_CONTAINER -->
    </div>

    <a href="https://wa.me/923339588254?text=Hello%20UTS%20Team%21%20I%20need%20help%20with%20methods" 
       class="whatsapp-float" 
       target="_blank"
       aria-label="Chat on WhatsApp">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.559 1.094 3.648l-.807 2.449 2.531-.742c1.045.57 2.224.873 3.436.874h.003c3.18 0 5.767-2.586 5.768-5.766.001-3.18-2.585-5.767-5.765-5.767zm-4.233 8.945l-.014-.021c-.514-.749-.788-1.634-.788-2.543 0-2.465 2.006-4.471 4.471-4.471 1.194 0 2.317.465 3.161 1.309.844.845 1.309 1.967 1.308 3.16 0 2.465-2.006 4.471-4.471 4.471-.888 0-1.754-.227-2.516-.656l-2.803.822.652-2.072z"/>
            <path d="M19.051 4.949C17.021 2.92 14.298 1.772 11.5 1.772c-5.342 0-9.688 4.346-9.688 9.688 0 1.704.445 3.378 1.289 4.839L1.5 22.5l6.348-1.64c1.413.799 3.01 1.222 4.652 1.222h.005c5.342 0 9.688-4.347 9.688-9.689 0-2.586-1.006-5.016-2.842-6.852l-.3.292zM11.5 20.504c-1.446 0-2.87-.393-4.115-1.136l-.296-.176-3.776.976 1.006-3.673-.192-.312c-.797-1.272-1.217-2.735-1.217-4.233 0-4.393 3.575-7.968 7.969-7.968 2.128 0 4.128.829 5.632 2.333 1.504 1.504 2.333 3.504 2.333 5.632.001 4.394-3.574 7.969-7.968 7.969z"/>
        </svg>
    </a>

    <div class="footer">
        <p>&copy; 2024 UTS Team Official | Premium Methods Portal | Search & Filter Enabled</p>
    </div>

    <script>
        // Search functionality
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearch');
        const searchInfo = document.getElementById('searchInfo');
        
        function filterMethods() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.method-card');
            let visibleCount = 0;
            
            cards.forEach(card => {
                const methodName = card.querySelector('.method-name').textContent.toLowerCase();
                if (searchTerm === '' || methodName.includes(searchTerm)) {
                    card.style.display = '';
                    visibleCount++;
                    // Highlight matching text
                    if (searchTerm !== '') {
                        highlightText(card.querySelector('.method-name'), searchTerm);
                    } else {
                        removeHighlight(card.querySelector('.method-name'));
                    }
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Update search info
            const totalCards = cards.length;
            if (searchTerm === '') {
                searchInfo.textContent = `Showing all ${totalCards} methods`;
                clearBtn.style.display = 'none';
            } else {
                searchInfo.textContent = `Found ${visibleCount} method${visibleCount !== 1 ? 's' : ''} matching "${searchTerm}"`;
                clearBtn.style.display = 'block';
            }
            
            // Update visible count stat
            document.getElementById('visibleCount').textContent = visibleCount;
            
            // Show no results message
            const methodsGrid = document.getElementById('methodsGrid');
            const existingNoResult = document.querySelector('.no-results');
            
            if (visibleCount === 0 && searchTerm !== '') {
                if (!existingNoResult) {
                    const noResultDiv = document.createElement('div');
                    noResultDiv.className = 'no-results';
                    noResultDiv.innerHTML = `<p>😕 No methods found for "<strong>${escapeHtml(searchTerm)}</strong>"</p><p>Try a different search term!</p>`;
                    methodsGrid.appendChild(noResultDiv);
                } else {
                    existingNoResult.innerHTML = `<p>😕 No methods found for "<strong>${escapeHtml(searchTerm)}</strong>"</p><p>Try a different search term!</p>`;
                }
            } else if (existingNoResult) {
                existingNoResult.remove();
            }
        }
        
        function highlightText(element, term) {
            if (!element) return;
            const originalText = element.textContent;
            if (!originalText.toLowerCase().includes(term)) return;
            
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            element.innerHTML = originalText.replace(regex, '<span class="highlight">$1</span>');
        }
        
        function removeHighlight(element) {
            if (!element) return;
            element.innerHTML = element.textContent;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function clearSearch() {
            searchInput.value = '';
            filterMethods();
            searchInput.focus();
        }
        
        // Update stats
        function updateStats() {
            const cards = document.querySelectorAll('.method-card');
            const total = cards.length;
            document.getElementById('methodCount').textContent = total;
            filterMethods(); // This will update visible count too
        }
        
        // Event listeners
        searchInput.addEventListener('input', filterMethods);
        
        // Initial load
        document.addEventListener('DOMContentLoaded', updateStats);
        
        // Observe for dynamic content changes
        const observer = new MutationObserver(updateStats);
        const container = document.getElementById('methodsContainer');
        if (container) {
            observer.observe(container, { 
                childList: true, 
                subtree: true 
            });
        }
    </script>
</body>
</html>
